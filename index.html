<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Minha To-Do List ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 class="titulo">✨ Minha To-Do List ✨</h1>
  </header>

  <main>
    <section id="form-section">
      <form id="task-form">
        <input type="text" id="task-input" placeholder="Digite uma tarefa..." required>
        <button type="submit" class="btn-principal">➕ Adicionar</button>
      </form>
    </section>

    <section id="filter-section">
      <button data-filter="all" class="btn-filtro todas">📋 Todas</button>
      <button data-filter="completed" class="btn-filtro concluidas">✔ Concluídas</button>
      <button data-filter="pending" class="btn-filtro pendentes">⏳ Pendentes</button>
    </section>

    <section id="list-section">
      <ul id="task-list"></ul>
    </section>

    <section id="progress-section">
      <p id="progress-text"></p>
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
      <p id="data-hora-text"></p>
      <p id="contador-text"></p>
    </section>
  </main>

<section id="motivacional">
  <h3>Frase motivacional</h3>
  <p id="frase"></p>
</section>

<footer>
  <p id="dataHora"></p>
  <p>Projeto Final – Programação para WEB I</p>
  <button onclick="window.location.href='sobre.html'">Sobre o Projeto</button>
</footer>

  <!-- Importação dos scripts -->
  <script src="js/classes.js"></script>
  <script src="js/funcoes.js"></script>
  <script src="js/dom.js"></script>
  <script src="js/api.js"></script> <!-- novo arquivo para AJAX -->
  <script src="js/main.js"></script>
</body>
</html>
